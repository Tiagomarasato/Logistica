<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logística Revimaq</title>
  
  <!-- Tailwind CSS para os estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Bibliotecas com versões fixas -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
  
  <!-- Leaflet CSS & JS para Mapas -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Bibliotecas do Firebase (Modo Compat para rodar no navegador) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
  <div id="root">
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #4b5563; font-family: sans-serif; text-align: center; padding: 20px;">
      <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;">A carregar o sistema...</h2>
      <p>É necessária ligação à internet para apresentar a aplicação.</p>
      <p style="font-size: 0.875rem; color: #ef4444; margin-top: 10px;">Se esta mensagem não desaparecer após alguns segundos, o seu navegador pode estar a bloquear os scripts. Recomendamos abrir o ficheiro com o <b>Google Chrome</b> ou <b>Microsoft Edge</b>.</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const Recharts = window.Recharts || {};
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } = Recharts;

    // --- INTEGRAÇÃO FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyD-AfnFkjsnjTE73vtlN8mq6DkwGzZo0rQ",
      authDomain: "logisiticarevimaq-1a671.firebaseapp.com",
      projectId: "logisiticarevimaq-1a671",
      storageBucket: "logisiticarevimaq-1a671.firebasestorage.app",
      messagingSenderId: "653655205908",
      appId: "1:653655205908:web:14007135d000f9f1a6df01"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- ÍCONES ---
    const IconTruck = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="15" height="8" x="1" y="3" rx="3"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>;
    const IconClock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const IconAlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const IconCheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const IconPackage = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
    const IconMapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const IconSearch = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const IconPlusCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>;
    const IconLayoutDashboard = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
    const IconListTodo = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>;
    const IconEdit = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
    const IconRefresh = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 2.6-6.4L2 9"/><path d="M3 22v-6h6"/></svg>;
    const IconEye = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
    const IconEyeOff = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;
    const IconUsers = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconTrash = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
    const IconBuilding = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;
    const IconPower = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>;
    const IconClipboardList = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;
    const IconMap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>;

    // --- COMPONENTES DE UI ---
    const StatusBadge = ({ status }) => {
      let colorClass = 'bg-gray-100 text-gray-800';
      let Icon = IconClock;

      if (status === 'Em rota') {
        colorClass = 'bg-blue-100 text-blue-800';
        Icon = IconTruck;
      } else if (status === 'Aguardar rota') {
        colorClass = 'bg-yellow-100 text-yellow-800';
        Icon = IconAlertCircle;
      } else if (status === 'Aguardar confirmação') {
        colorClass = 'bg-orange-100 text-orange-800';
        Icon = IconClock;
      } else if (status === 'Concluído') {
        colorClass = 'bg-green-100 text-green-800';
        Icon = IconCheckCircle2;
      } else if (status === 'Cancelado') {
        colorClass = 'bg-red-100 text-red-800';
        Icon = IconAlertCircle;
      } else if (status === 'A definir' || !status) {
        colorClass = 'bg-gray-200 text-gray-600';
        Icon = IconClock;
        status = 'A definir';
      }

      return (
        <span style={{ whiteSpace: 'nowrap', width: 'max-content' }} className={`inline-flex items-center flex-shrink-0 px-2.5 py-0.5 rounded-full text-xs font-medium whitespace-nowrap ${colorClass}`}>
          <Icon className="w-3 h-3 mr-1 flex-shrink-0" />
          {status}
        </span>
      );
    };

    const PriorityBadge = ({ priority }) => {
      const p = parseInt(priority);
      const color = p === 1 ? 'bg-red-100 text-red-800 border-red-200' : 
                    p === 2 ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 
                    'bg-green-100 text-green-800 border-green-200';
      return (
        <span className={`inline-flex px-2 py-0.5 rounded text-xs font-bold border ${color}`}>
          P{priority}
        </span>
      );
    };

    // --- TELA DE LOGIN / CADASTRO ---
    const AuthScreen = ({ onAuthSuccess }) => {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [nome, setNome] = useState('');
      const [chave, setChave] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);

        if (!isLogin) {
          if (chave !== 'Revi') {
            alert('Chave de Acesso incorreta!');
            setLoading(false);
            return;
          }
          if (password !== confirmPassword) {
            alert('As senhas não coincidem!');
            setLoading(false);
            return;
          }

          try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await userCredential.user.updateProfile({ displayName: nome });
            alert('Cadastro realizado com sucesso!');
            onAuthSuccess(userCredential.user);
          } catch (error) {
            alert('Erro ao cadastrar: ' + error.message);
          }
        } else {
          try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            onAuthSuccess(userCredential.user);
          } catch (error) {
            alert('E-mail ou senha incorretos.');
          }
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4">
          <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 w-full max-w-sm">
            <h2 className="text-2xl font-bold text-blue-700 text-center mb-1">Logística Revimaq</h2>
            <p className="text-sm text-gray-500 text-center mb-6">
              {isLogin ? 'Faça login para aceder ao sistema' : 'Preencha os seus dados e a Chave de Acesso'}
            </p>

            <form onSubmit={handleSubmit} className="space-y-4">
              {!isLogin && (
                <>
                  <div>
                    <input required type="password" placeholder="Chave de Acesso" value={chave} onChange={(e) => setChave(e.target.value)} className="w-full border border-gray-300 rounded-md px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-gray-700" />
                  </div>
                  <div>
                    <input required type="text" placeholder="O seu Nome" value={nome} onChange={(e) => setNome(e.target.value)} className="w-full border border-gray-300 rounded-md px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-gray-700" />
                  </div>
                </>
              )}
              
              <div>
                <input required type="email" placeholder="E-mail" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full border border-gray-300 rounded-md px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-gray-700" />
              </div>
              
              <div>
                <input required type="password" placeholder="Senha" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full border border-gray-300 rounded-md px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-gray-700" />
              </div>

              {!isLogin && (
                <div>
                  <input required type="password" placeholder="Confirmar Senha" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} className="w-full border border-gray-300 rounded-md px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-gray-700" />
                </div>
              )}

              <button disabled={loading} type="submit" className="w-full py-2.5 bg-gray-100 border border-gray-300 hover:bg-gray-200 text-gray-800 font-bold rounded-md transition-colors disabled:opacity-50 mt-2">
                {loading ? 'A carregar...' : (isLogin ? 'Entrar' : 'Confirmar Cadastro')}
              </button>
            </form>

            <div className="mt-6 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-sm text-blue-600 hover:underline font-medium">
                {isLogin ? 'Criar uma nova conta' : 'Voltar para Login'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- ABAS ---
    
    // 1. DASHBOARD
    const DashboardTab = ({ registros, motoristas }) => {
      const [selectedCity, setSelectedCity] = useState(null);
      const [selectedMotorista, setSelectedMotorista] = useState(null);
      const [selectedCardFilter, setSelectedCardFilter] = useState(null);
      const [hideCompleted, setHideCompleted] = useState(true);

      const getInitialDates = () => {
        const today = new Date();
        const sevenDaysAgo = new Date(today);
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        
        const formatYMD = (date) => {
          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, '0');
          const d = String(date.getDate()).padStart(2, '0');
          return `${y}-${m}-${d}`;
        };
        
        return { start: formatYMD(sevenDaysAgo), end: formatYMD(today) };
      };

      const [startDate, setStartDate] = useState(getInitialDates().start);
      const [endDate, setEndDate] = useState(getInitialDates().end);

      const filteredRegistros = useMemo(() => {
        const start = startDate ? new Date(startDate + 'T00:00:00') : null;
        const end = endDate ? new Date(endDate + 'T23:59:59') : null;

        return registros.filter(r => {
          if (!r.data) return false;
          const [datePart] = r.data.split(' ');
          if (!datePart) return false;
          const [day, month, year] = datePart.split('/');
          const rDate = new Date(year, month - 1, day, 12, 0, 0); 
          
          if (start && rDate < start) return false;
          if (end && rDate > end) return false;
          if (hideCompleted && (r.status === 'Concluído' || r.status === 'Cancelado')) return false;

          return true;
        });
      }, [registros, startDate, endDate, hideCompleted]);

      const stats = {
        total: filteredRegistros.length,
        emRota: filteredRegistros.filter(r => r.status === 'Em rota').length,
        aDefinir: filteredRegistros.filter(r => r.status === 'A definir' || !r.status).length,
        entregas: filteredRegistros.filter(r => r.tipo === 'Entrega').length,
      };

      const motoristaData = useMemo(() => {
        const counts = filteredRegistros.reduce((acc, curr) => {
          acc[curr.motorista] = (acc[curr.motorista] || 0) + 1;
          return acc;
        }, {});
        return Object.keys(counts).map(key => {
          const motoristaObj = motoristas.find(m => m.nome === key);
          return {
            name: key, 
            quantidade: counts[key],
            cor: motoristaObj ? motoristaObj.cor : '#3b82f6'
          };
        }).sort((a,b) => b.quantidade - a.quantidade);
      }, [filteredRegistros, motoristas]);

      const cidadeData = useMemo(() => {
        const counts = filteredRegistros.reduce((acc, curr) => {
          acc[curr.cidade] = (acc[curr.cidade] || 0) + 1;
          return acc;
        }, {});
        return Object.keys(counts).map(key => ({ name: key, quantidade: counts[key] })).sort((a,b) => b.quantidade - a.quantidade);
      }, [filteredRegistros]);

      let tableData = [];
      let tableTitle = null;
      let headerBgClass = "bg-blue-50/30";

      if (selectedCity) {
        tableData = filteredRegistros.filter(r => r.cidade === selectedCity);
        tableTitle = <>Lançamentos em: <span className="text-blue-600">{selectedCity}</span></>;
      } else if (selectedMotorista) {
        tableData = filteredRegistros.filter(r => r.motorista === selectedMotorista);
        tableTitle = <>Lançamentos de: <span className="text-blue-600">{selectedMotorista}</span></>;
      } else if (selectedCardFilter === 'total') {
        tableData = filteredRegistros;
        tableTitle = <>Todos os Lançamentos <span className="text-blue-600">(Total)</span></>;
      } else if (selectedCardFilter === 'emRota') {
        tableData = filteredRegistros.filter(r => r.status === 'Em rota');
        tableTitle = <>Lançamentos em: <span className="text-green-600">Rota</span></>;
        headerBgClass = "bg-green-50/30";
      } else if (selectedCardFilter === 'aDefinir') {
        tableData = filteredRegistros.filter(r => r.status === 'A definir' || !r.status);
        tableTitle = <>Lançamentos: <span className="text-gray-600">A definir</span></>;
        headerBgClass = "bg-gray-50/50";
      } else if (selectedCardFilter === 'cidades') {
        tableData = filteredRegistros;
        tableTitle = <>Lançamentos por: <span className="text-purple-600">Cidades Atendidas</span></>;
        headerBgClass = "bg-purple-50/30";
      }

      return (
        <div className="space-y-6">
          <div className="bg-white px-6 py-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4">
            <h3 className="font-semibold text-gray-800 flex items-center">
              <IconClock className="w-5 h-5 mr-2 text-blue-600"/> 
              Filtro de Período
            </h3>
            <div className="flex flex-col sm:flex-row items-center gap-4">
              <button
                onClick={() => setHideCompleted(!hideCompleted)}
                className={`flex items-center space-x-2 px-4 py-2 rounded-lg border transition-colors text-sm font-medium ${hideCompleted ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}
                title={hideCompleted ? "Mostrar todos os itens" : "Ocultar Concluídos e Cancelados"}
              >
                {hideCompleted ? <IconEye className="w-4 h-4" /> : <IconEyeOff className="w-4 h-4" />}
                <span>{hideCompleted ? 'Mostrar Ocultos' : 'Ocultar Concluídos/Cancelados'}</span>
              </button>
              <div className="flex items-center space-x-2 sm:space-x-3 sm:border-l sm:pl-4 border-gray-200">
                <span className="text-sm text-gray-500 font-medium hidden sm:inline">De:</span>
                <input 
                  type="date" 
                  value={startDate} 
                  onChange={(e) => setStartDate(e.target.value)} 
                  className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors" 
                />
                <span className="text-sm text-gray-500 font-medium">até</span>
                <input 
                  type="date" 
                  value={endDate} 
                  onChange={(e) => setEndDate(e.target.value)} 
                  className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors" 
                />
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div

  // 2. LISTA / ACOMPANHAMENTOS
  const ListTab = ({ registros, setEditingRecord, setActiveTab, motoristas, clientes, userEmail, userName }) => {

    const [isAddModalOpen, setIsAddModalOpen] = useState(false);
    const [step, setStep] = useState(1);
    const [formData, setFormData] = useState({
      tipo: 'Entrega', prioridade: '3', cidade: '', cliente: '', cnpj: '',
      endereco: '', numero: '', qtd: '1', material: 'PC', obs: '', solicitante: '',
      telefone: '', agendado: 'Não', dataAgendada: '', email: userEmail || '',
      status: 'A definir', motorista: 'A definir'
    });

    const handleFormChange = (e) => {
      const { name, value } = e.target;
      let formattedValue = value;

      if (name === 'cnpj') {
        formattedValue = formattedValue.replace(/\D/g, "");
        if (formattedValue.length > 14) formattedValue = formattedValue.slice(0, 14);
        formattedValue = formattedValue.replace(/^(\d{2})(\d)/, "$1.$2");
        formattedValue = formattedValue.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
        formattedValue = formattedValue.replace(/\.(\d{3})(\d)/, ".$1/$2");
        formattedValue = formattedValue.replace(/(\d{4})(\d)/, "$1-$2");
      }
      
      setFormData(prev => {
        const nextState = { ...prev, [name]: formattedValue };
        
        // Auto-preenchimento ao selecionar o cliente
        if (name === 'cliente') {
          const clientFound = clientes.find(c => c.cliente === formattedValue);
          if (clientFound) {
            nextState.cnpj = clientFound.cnpj || nextState.cnpj;
            nextState.cidade = clientFound.cidade || nextState.cidade;
            nextState.endereco = clientFound.endereco || nextState.endereco;
            nextState.numero = clientFound.numero || nextState.numero;
          }
        }
        
        return nextState;
      });
    };

    const searchClientByCnpj = () => {
      if (!formData.cnpj || formData.cnpj.length < 18) return;
      const found = clientes.find(c => c.cnpj === formData.cnpj);
      if (found) {
        setFormData(prev => ({
          ...prev,
          cliente: found.cliente,
          cidade: found.cidade,
          endereco: found.endereco,
          numero: found.numero || ''
        }));
      } else {
        setShowCnpjNotFound(true);
      }
    };

    const searchClientByName = () => {
      if (!formData.cliente) return;
      const term = formData.cliente.toLowerCase();
      const exactMatch = clientes.find(c => c.cliente.toLowerCase() === term);
      const partialMatch = clientes.find(c => c.cliente.toLowerCase().includes(term));
      const found = exactMatch || partialMatch;
      
      if (found) {
        setFormData(prev => ({
          ...prev,
          cliente: found.cliente,
          cnpj: found.cnpj || prev.cnpj,
          cidade: found.cidade || prev.cidade,
          endereco: found.endereco || prev.endereco,
          numero: found.numero || prev.numero
        }));
      } else {
        setShowCnpjNotFound(true);
      }
    };

    const handleCnpjKeyDown = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        searchClientByCnpj();
      } else if (e.key === 'Tab') {
        if (formData.cnpj && formData.cnpj.length === 18) {
          const found = clientes.find(c => c.cnpj === formData.cnpj);
          if (found) {
            setFormData(prev => ({ ...prev, cliente: found.cliente, cidade: found.cidade, endereco: found.endereco, numero: found.numero || '' }));
          } else {
            e.preventDefault(); 
            setShowCnpjNotFound(true);
          }
        }
      }
    };

    const handleNextStep = (e) => {
      e.preventDefault();
      setStep(2);
    };

    const handleSaveNewRecord = async (e) => {
      e.preventDefault();
      const novoRegistro = {
        data: new Date().toLocaleString('pt-PT').replace(',', ''),
        timestamp: Date.now(), 
        logs: [{
          dataHora: new Date().toLocaleString('pt-PT').replace(',', ''),
          usuario: userName,
          acao: 'Criação',
          detalhes: 'Lançamento criado (Nova Solicitação)'
        }],
        ...formData
      };
      delete novoRegistro.id;

      try {
        await db.collection('registros').add(novoRegistro);
        // Não é necessário atualizar o state local manualmente devido ao onSnapshot do Firebase
      } catch (error) {
        alert('Erro ao guardar no Firebase: ' + error.message);
      }
      
      setIsAddModalOpen(false);
      setStep(1);
      resetForm();
    };

    const resetForm = () => {
      setFormData({
        tipo: 'Entrega', prioridade: '3', cidade: '', cliente: '', cnpj: '',
        endereco: '', numero: '', qtd: '1', material: 'PC', obs: '', solicitante: '',
        telefone: '', agendado: 'Não', dataAgendada: '', email: userEmail || '',
        status: 'A definir', motorista: 'A definir'
      });
    };

    const getInitialDates = () => {
      const today = new Date();
      const sevenDaysAgo = new Date(today);
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
      
      const formatYMD = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      };
      
      return { start: formatYMD(sevenDaysAgo), end: formatYMD(today) };
    };

    const [startDate, setStartDate] = useState(getInitialDates().start);
    const [endDate, setEndDate] = useState(getInitialDates().end);

    const filteredData = registros.filter(r => {
      const matchSearch = r.cliente?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                          r.cidade?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                          r.motorista?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                          (r.obs || '').toLowerCase().includes(searchTerm.toLowerCase());
      
      const matchCompleted = hideCompleted ? (r.status !== 'Concluído' && r.status !== 'Cancelado') : true;

      const start = startDate ? new Date(startDate + 'T00:00:00') : null;
      const end = endDate ? new Date(endDate + 'T23:59:59') : null;
      
      if (!r.data) return false;
      const [datePart] = r.data.split(' ');
      if (!datePart) return false;
      
      const [day, month, year] = datePart.split('/');
      const rDate = new Date(year, month - 1, day, 12, 0, 0); 
      
      let matchDate = true;
      if (start && rDate < start) matchDate = false;
      if (end && rDate > end) matchDate = false;
      
      return matchSearch && matchCompleted && matchDate;
    });

    const executeSave = async (dataToSave) => {
      const originalRecord = registros.find(r => r.id === dataToSave.id);
      const currentLogs = originalRecord.logs || [];
      
      let mudancas = [];
      if (originalRecord.status !== dataToSave.status) mudancas.push(`Status: ${originalRecord.status} ➔ ${dataToSave.status}`);
      if (originalRecord.motorista !== dataToSave.motorista) mudancas.push(`Motorista: ${originalRecord.motorista} ➔ ${dataToSave.motorista}`);
      
      const oldOcorrencia = originalRecord.ocorrencias || '';
      const newOcorrencia = dataToSave.ocorrencias ? dataToSave.ocorrencias.trim() : '';
      
      if (oldOcorrencia !== newOcorrencia) {
        if (newOcorrencia) {
          mudancas.push(`Ocorrência: ${newOcorrencia}`);
        } else {
          mudancas.push(`Ocorrência removida`);
        }
      }
      
      if (mudancas.length === 0) {
        setQuickEditData(null);
        setOcorrenciaAction(null);
        return;
      }

      const newLog = {
        dataHora: new Date().toLocaleString('pt-PT').replace(',', ''),
        usuario: userName,
        acao: 'Atualização Rápida',
        detalhes: mudancas.join(' | ')
      };

      const updatedLogs = [...currentLogs, newLog];

      try {
        await db.collection('registros').doc(dataToSave.id).update({
          status: dataToSave.status,
          motorista: dataToSave.motorista,
          ocorrencias: newOcorrencia,
          logs: updatedLogs
        });
        // Atualização em tempo real cuida do estado local
      } catch (error) {
        alert('Erro ao atualizar: ' + error.message);
      }
      setQuickEditData(null);
      setOcorrenciaAction(null);
    };

    const handleQuickEditSave = (e) => {
      e.preventDefault();
      
      const originalRecord = registros.find(r => r.id === quickEditData.id);
      const oldOcorrencia = originalRecord.ocorrencias || '';
      const newOcorrencia = quickEditData.ocorrencias ? quickEditData.ocorrencias.trim() : '';
      
      const hasNovaOcorrencia = newOcorrencia !== '' && newOcorrencia !== oldOcorrencia;

      if (hasNovaOcorrencia) {
        setOcorrenciaAction(quickEditData);
      } else {
        executeSave(quickEditData);
      }
    };

    return (
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 relative">

          <div className="flex flex-col sm:flex-row sm:items-center gap-2 lg:gap-4">

              <input 
                type="date" 
                value={startDate} 
                onChange={(e) => setStartDate(e.target.value)} 
                className="border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors" 
              />
              <span className="text-sm text-gray-500 font-medium whitespace-nowrap">até</span>
              <input 
                type="date" 
                value={endDate} 
                onChange={(e) => setEndDate(e.target.value)} 
                className="border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors" 
              />
            </div>
            <button
              onClick={() => setHideCompleted(!hideCompleted)}
              className={`flex items-center space-x-2 px-3 py-2 rounded-lg border transition-colors text-sm font-medium whitespace-nowrap ${hideCompleted ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}
              title={hideCompleted ? "Mostrar todos os itens" : "Ocultar itens finalizados"}
            >
              {hideCompleted ? <IconEye className="w-4 h-4" /> : <IconEyeOff className="w-4 h-4" />}
              <span className="hidden md:inline">{hideCompleted ? 'Mostrar Concluídos' : 'Ocultar Concluídos'}</span>
            </button>
            <div className="flex items-center space-x-2 lg:space-x-3">
              <div className="relative">
                <IconSearch className="w-5 h-5 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                <input 
                  type="text" 
                  placeholder="Buscar cliente, cidade..." 
                  className="pl-9 pr-3 py-2 border border-gray-300 rounded-lg w-full sm:w-40 lg:w-48 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
              </div>
              <button 
                onClick={() => { resetForm(); setIsAddModalOpen(true); setStep(1); }}
                className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white hover:bg-blue-700 transition-colors shadow-sm flex-shrink-0"
                title="Nova Solicitação"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
              </button>

                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* MODAL DE EXCLUSÃO (LANÇAMENTOS) */}
        {deletePrompt && (
          <div className="fixed inset-0 bg-gray-900/60 flex items-center justify-center z-[80] p-4">
            <div className="bg-white rounded-xl shadow-lg w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200">
              <div className="px-6 py-4 border-b border-gray-100 bg-red-50/50 flex items-center justify-between">
                <div className="flex items-center">
                  <IconTrash className="w-5 h-5 text-red-500 mr-2" />
                  <h3 className="font-bold text-gray-800">Confirmar Exclusão</h3>
                </div>
                <button onClick={() => setDeletePrompt(null)} className="text-gray-400 hover:text-gray-600 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
              </div>
              <div className="p-6 space-y-4">
                <p className="text-sm text-gray-600 text-center">Para excluir este lançamento, insira a <b>Chave de Acesso</b> do sistema.</p>
                <input 
                  type="password" 
                  placeholder="Chave de Acesso" 
                  value={deleteKey} 
                  onChange={(e) => setDeleteKey(e.target.value)} 
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none text-center tracking-widest" 
                  autoFocus
                />
                <div className="pt-2 flex justify-end space-x-3">
                  <button onClick={() => setDeletePrompt(null)} className="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">Cancelar</button>
                  <button onClick={async () => {
                    if (deleteKey !== 'Revi') { alert('Chave de Acesso incorreta!'); return; }
                    try {
                      await db.collection('registros').doc(deletePrompt.id).delete();
                      setDeletePrompt(null);
                      // O onSnapshot cuida de remover o item da lista
                    } catch (error) { alert('Erro ao excluir: ' + error.message); }
                  }} className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm font-medium shadow-sm flex items-center">
                    Excluir
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // --- TAB DE MAPA DE ROTAS ---
  const globalGeocodeCache = {
    'Jundiaí': [-23.1857, -46.8836],
    'São Paulo': [-23.5505, -46.6333],
    'Campinas': [-22.9099, -47.0626],
    'Vinhedo': [-23.0298, -46.9744],
    'Louveira': [-23.0858, -46.9505],
    'Valinhos': [-22.9712, -46.9964],
    'Itatiba': [-23.0016, -46.8354],
    'Várzea Paulista': [-23.2125, -46.8282],
    'Campo Limpo Paulista': [-23.2104, -46.7876],
    'Cajamar': [-23.3541, -46.8752],
    'Itupeva': [-23.1532, -47.0577],
    'Cabreúva': [-23.3073, -47.0581],
    'Cabriúva': [-23.3073, -47.0581],
    'Indaiatuba': [-23.0903, -47.2181]
  };

  const MapTab = ({ registros, motoristas, clientes }) => {
    const mapRef = React.useRef(null);
    const markersLayer = React.useRef(null);
    const [selectedMotorista, setSelectedMotorista] = useState('');
    const [hideCompleted, setHideCompleted] = useState(true);
    const [isLoadingMap, setIsLoadingMap] = useState(false);

    const filtered = useMemo(() => {
      return registros.filter(r => {
        if (hideCompleted && (r.status === 'Concluído' || r.status === 'Cancelado')) return false;
        if (selectedMotorista && r.motorista !== selectedMotorista) return false;
        return true;
      });
    }, [registros, selectedMotorista, hideCompleted]);

    const regions = useMemo(() => {
      const counts = {};
      filtered.forEach(r => {
        const city = r.cidade ? r.cidade.trim().toUpperCase() : 'DESCONHECIDA';
        counts[city] = (counts[city] || 0) + 1;
      });
      return Object.keys(counts).map(c => ({ name: c, count: counts[c] })).sort((a,b) => b.count - a.count);
    }, [filtered]);

    useEffect(() => {
      if (!window.L) return; 
      if (!mapRef.current) {
        mapRef.current = L.map('leaflet-map').setView([-23.1857, -46.8836], 10);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(mapRef.current);
        
        markersLayer.current = L.layerGroup().addTo(mapRef.current);

        setTimeout(() => {
          if (mapRef.current) {
            mapRef.current.invalidateSize();
          }
        }, 300);
      }

      return () => {
        if (mapRef.current) {
          mapRef.current.remove();
          mapRef.current = null;
        }
      };
    }, []);

    useEffect(() => {
      if (!mapRef.current || !markersLayer.current) return;

      const plotMarkers = async () => {
        setIsLoadingMap(true);
        markersLayer.current.clearLayers();
        const coordCounts = {};

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        for (const reg of filtered) {
          const clientMatch = clientes ? clientes.find(c => c.cliente === reg.cliente) : null;

          const rawCity = (clientMatch?.cidade || reg.cidade || '').trim();
          const rawAddress = (clientMatch?.endereco || reg.endereco || '').trim();
          const rawNumber = (clientMatch?.numero || reg.numero || '').trim();
          const rawCep = (clientMatch?.cep || '').trim();

          if (!rawCity) continue;

          const cleanStreet = rawAddress.split(',')[0].trim();
          const cleanNumber = rawNumber.split(/[-/ ]/)[0].trim();
          const cleanCep = rawCep.replace(/\D/g, ""); 

          const cacheKey = `${cleanCep} ${cleanStreet} ${cleanNumber} ${rawCity}`.toLowerCase();
          let coords = globalGeocodeCache[cacheKey];

          if (!coords) {
            if (cleanCep && cleanCep.length === 8) {
              try {
                const resCep = await fetch(`https://cep.awesomeapi.com.br/json/${cleanCep}`);
                if (resCep.ok) {
                  const dataCep = await resCep.json();
                  if (dataCep.lat && dataCep.lng) {
                    coords = [parseFloat(dataCep.lat), parseFloat(dataCep.lng)];
                  }
                }
              } catch (e) { console.error("Erro CEP:", e); }
            }

            if (!coords && cleanStreet) {
              try {
                const query = cleanNumber ? `${cleanStreet}, ${cleanNumber}, ${rawCity}, Brasil` : `${cleanStreet}, ${rawCity}, Brasil`;
                const resNom = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const dataNom = await resNom.json();
                if (dataNom && dataNom.length > 0) {
                  coords = [parseFloat(dataNom[0].lat), parseFloat(dataNom[0].lon)];
                }
                await sleep(1000); 
              } catch (e) { console.error("Erro Nominatim:", e); }
            }

            if (!coords) {
              const cityKey = Object.keys(globalGeocodeCache).find(k => k.toLowerCase() === rawCity.toLowerCase());
              coords = cityKey ? globalGeocodeCache[cityKey] : null;
            }

            if (coords) {
              globalGeocodeCache[cacheKey] = coords;
            }
          }

          if (coords) {
            const coordStr = `${coords[0]},${coords[1]}`;
            coordCounts[coordStr] = (coordCounts[coordStr] || 0) + 1;
            const offset = (coordCounts[coordStr] - 1) * 0.003; 
            const finalCoords = [coords[0] + offset, coords[1] + offset];

            const motInfo = motoristas.find(m => m.nome === reg.motorista);
            const color = motInfo ? motInfo.cor : '#6b7280';

            const iconHtml = `
              <div style="background-color: ${color}; width: 28px; height: 28px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 11px;">
                P${reg.prioridade}
              </div>
              <div style="position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid ${color};"></div>
            `;

            const icon = L.divIcon({
              className: 'custom-leaflet-icon',
              html: iconHtml,
              iconSize: [28, 36],
              iconAnchor: [14, 36],
              popupAnchor: [0, -36]
            });

            const marker = L.marker(finalCoords, { icon }).addTo(markersLayer.current);
            marker.bindPopup(`
              <div style="font-family: sans-serif; min-width: 220px;">
                <h4 style="margin: 0 0 5px 0; font-weight: bold; color: #1e3a5f;">${reg.cliente}</h4>
                <p style="margin: 0; font-size: 12px; color: #6b7280;">${rawAddress}${rawNumber ? ', ' + rawNumber : ''}, ${rawCity}</p>
                <div style="margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px;">
                  <p style="margin: 0 0 4px 0; font-size: 13px;"><strong>Motorista:</strong> <span style="color: ${color}; font-weight: 600;">${reg.motorista}</span></p>
                  <p style="margin: 0 0 4px 0; font-size: 13px;"><strong>Status:</strong> ${reg.status}</p>
                  <p style="margin: 0; font-size: 13px;"><strong>Tipo:</strong> ${reg.tipo}</p>
                </div>
              </div>
            `);
          }
        }
        setIsLoadingMap(false);
      };

      plotMarkers();
    }, [filtered, motoristas, clientes]);

    // Foca o mapa numa cidade específica
    const focusOnCity = (cityName) => {
      if (!mapRef.current) return;

      // Função para remover acentos e deixar em minúsculas
      const normalize = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
      const targetCity = normalize(cityName);

      // 1. Tenta encontrar a cidade nas chaves diretas cadastradas
      let foundKey = Object.keys(globalGeocodeCache).find(k => normalize(k) === targetCity);
      
      // 2. Se não encontrar, procura nas rotas dinâmicas guardadas (endereço + cidade)
      if (!foundKey) {
         foundKey = Object.keys(globalGeocodeCache).find(k => normalize(k).includes(targetCity));
      }

      if (foundKey && globalGeocodeCache[foundKey]) {
        mapRef.current.flyTo(globalGeocodeCache[foundKey], 12, { duration: 1.5 });
      }
    };

    return (
      <div className="space-y-6 animate-in fade-in duration-300">
        <div className="bg-white px-6 py-4 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row items-center justify-between gap-4">
          <h3 className="font-semibold text-gray-800 flex items-center">
            <IconMap className="w-5 h-5 mr-2 text-blue-600"/> 
            Mapa de Roteirização
          </h3>
          <div className="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
            <select 
              value={selectedMotorista} 
              onChange={(e) => setSelectedMotorista(e.target.value)}
              className="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 bg-white w-full sm:w-48"
            >
              <option value="">Todos os Motoristas</option>
              {motoristas.map(m => (
                <option key={m.nome} value={m.nome}>{m.nome}</option>
              ))}
            </select>
            <button
              onClick={() => setHideCompleted(!hideCompleted)}
              className={`flex items-center justify-center space-x-2 px-4 py-2 rounded-lg border transition-colors text-sm font-medium w-full sm:w-auto ${hideCompleted ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}
            >
              {hideCompleted ? <IconEye className="w-4 h-4" /> : <IconEyeOff className="w-4 h-4" />}
              <span>{hideCompleted ? 'Mostrar Ocultos' : 'Ocultar Concluídos/Cancelados'}</span>
            </button>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <div className="lg:col-span-1 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[600px]">
            <div className="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
              <h3 className="font-bold text-gray-800 text-sm uppercase tracking-wide">Lançamentos por Região</h3>
              <p className="text-xs text-gray-500 mt-1">Clique para focar no mapa</p>
            </div>
            <div className="overflow-y-auto flex-1 p-2 space-y-2">
              {regions.length === 0 ? (
                <div className="p-4 text-center text-gray-500 text-sm">Nenhuma região com lançamentos ativos.</div>
              ) : (
                regions.map((reg) => (
                  <button 
                    key={reg.name}
                    onClick={() => focusOnCity(reg.name)}
                    className="w-full text-left px-4 py-3 rounded-lg border border-gray-100 hover:bg-blue-50 hover:border-blue-200 transition-colors flex justify-between items-center group"
                  >
                    <span className="font-medium text-gray-700 group-hover:text-blue-700">{reg.name}</span>
                    <span className="bg-blue-100 text-blue-700 py-1 px-2.5 rounded-full text-xs font-bold">{reg.count}</span>
                  </button>
                ))
              )}
            </div>
            <div className="p-4 border-t border-gray-100 bg-gray-50/50 text-xs text-gray-500 text-center">
              A cor do pino reflete a cor do motorista. O número central indica a prioridade.
            </div>
          </div>

          <div className="lg:col-span-3 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden relative h-[600px]">
            <div id="leaflet-map" className="w-full h-full z-0 relative"></div>
            {isLoadingMap && (
              <div className="absolute top-4 right-4 bg-white/95 backdrop-blur-sm px-4 py-2 rounded-lg shadow-lg border border-gray-100 text-sm font-medium text-gray-700 flex items-center z-[1000]">
                <IconRefresh className="w-4 h-4 animate-spin mr-2 text-blue-600"/> 
                A posicionar rotas...
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  // 3. FORMULÁRIO DE LANÇAMENTO (Página inteira)
  const FormTab = ({ registros, editingRecord, setEditingRecord, setActiveTab, motoristas, clientes, userEmail, userName }) => {
    const [formData, setFormData] = useState(editingRecord || {
      tipo: 'Entrega',
      prioridade: '3',
      cidade: '',
      cliente: '',
      cnpj: '',
      endereco: '',
      numero: '',
      qtd: '1',
      material: 'PC',
      obs: '',
      solicitante: '',
      telefone: '',
      agendado: 'Não',
      dataAgendada: '',
      email: userEmail || '',
      status: 'A definir',
      motorista: 'A definir'
    });

    const handleChange = (e) => {
      const { name, value } = e.target;
      let formattedValue = value;

      if (name === 'cnpj') {
        formattedValue = formattedValue.replace(/\D/g, "");
        if (formattedValue.length > 14) formattedValue = formattedValue.slice(0, 14);
        formattedValue = formattedValue.replace(/^(\d{2})(\d)/, "$1.$2");
        formattedValue = formattedValue.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
        formattedValue = formattedValue.replace(/\.(\d{3})(\d)/, ".$1/$2");
        formattedValue = formattedValue.replace(/(\d{4})(\d)/, "$1-$2");
      }

      setFormData(prev => {
        const nextState = { ...prev, [name]: formattedValue };
        
        // Auto-preenchimento ao selecionar o cliente
        if (name === 'cliente') {
          const clientFound = clientes.find(c => c.cliente === formattedValue);
          if (clientFound) {
            nextState.cnpj = clientFound.cnpj || nextState.cnpj;
            nextState.cidade = clientFound.cidade || nextState.cidade;
            nextState.endereco = clientFound.endereco || nextState.endereco;
            nextState.numero = clientFound.numero || nextState.numero;
          }
        }
        
        return nextState;
      });
    };

    const searchClientByCnpj = () => {
      if (!formData.cnpj || formData.cnpj.length < 18) return;
      const found = clientes.find(c => c.cnpj === formData.cnpj);
      if (found) {
        setFormData(prev => ({
          ...prev,
          cliente: found.cliente,
          cidade: found.cidade || prev.cidade,
          endereco: found.endereco || prev.endereco,
          numero: found.numero || prev.numero
        }));
      } else {
        alert('CNPJ não encontrado na base de clientes.');
      }
    };

    const searchClientByName = () => {
      if (!formData.cliente) return;
      const term = formData.cliente.toLowerCase();
      const exactMatch = clientes.find(c => c.cliente.toLowerCase() === term);
      const partialMatch = clientes.find(c => c.cliente.toLowerCase().includes(term));
      const found = exactMatch || partialMatch;
      
      if (found) {
        setFormData(prev => ({
          ...prev,
          cliente: found.cliente,
          cnpj: found.cnpj || prev.cnpj,
          cidade: found.cidade || prev.cidade,
          endereco: found.endereco || prev.endereco,
          numero: found.numero || prev.numero
        }));
      } else {
        alert('Cliente não encontrado na base de dados.');
      }
    };

    const handleSubmit = async (e) => {
      e.preventDefault();
      
      if (editingRecord) {
        const payload = { ...formData };
        const recordId = payload.id;
        delete payload.id; 

        const currentLogs = editingRecord.logs || [];
        const fieldsToTrack = {
            status: 'Status', motorista: 'Motorista', prioridade: 'Prioridade',
            tipo: 'Tipo', cliente: 'Cliente', cidade: 'Cidade', qtd: 'Quantidade',
            material: 'Material', obs: 'Obs/NF', agendado: 'Agendado', endereco: 'Endereço', numero: 'Número'
        };
        
        let mudancas = [];
        for (let key in fieldsToTrack) {
            if (String(editingRecord[key] || '') !== String(payload[key] || '')) {
                mudancas.push(`${fieldsToTrack[key]}: ${editingRecord[key] || '-'} ➔ ${payload[key] || '-'}`);
            }
        }
        
        if (mudancas.length > 0) {
            payload.logs = [...currentLogs, {
                dataHora: new Date().toLocaleString('pt-PT').replace(',', ''),
                usuario: userName,
                acao: 'Edição Completa',
                detalhes: mudancas.join(' | ')
            }];
        } else {
            payload.logs = currentLogs;
        }

        try {
          await db.collection('registros').doc(recordId).update(payload);
          alert('Solicitação atualizada com sucesso!');
        } catch (error) {
          alert('Erro ao atualizar: ' + error.message);
        }
      } else {
        const novoRegistro = {
          data: new Date().toLocaleString('pt-PT').replace(',', ''),
          timestamp: Date.now(),
          logs: [{
            dataHora: new Date().toLocaleString('pt-PT').replace(',', ''),
            usuario: userName,
            acao: 'Criação',
            detalhes: 'Lançamento criado'
          }],
          ...formData
        };
        delete novoRegistro.id;

        try {
          await db.collection('registros').add(novoRegistro);
          alert('Solicitação cadastrada com sucesso!');
        } catch (error) {
          alert('Erro ao cadastrar: ' + error.message);
        }
      }
      
      setEditingRecord(null);
      setActiveTab('lista');
    };

    return (
      <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div className="px-8 py-6 border-b border-gray-100 bg-gray-50/50">
          <h2 className="text-xl font-bold text-gray-800">{editingRecord ? 'Editar Lançamento' : 'Novo Lançamento de Logística'}</h2>
          <p className="text-sm text-gray-500 mt-1">{editingRecord ? 'Atualize os dados da solicitação.' : 'Preencha os dados abaixo para solicitar uma coleta ou entrega.'}</p>
        </div>
        
        <form onSubmit={handleSubmit} className="p-8 space-y-8">
          <div>
            <h3 className="text-sm font-semibold text-gray-800 uppercase tracking-wider mb-4 border-b pb-2">1. Dados Gerais</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Tipo de Solicitação</label>
                <select name="tipo" value={formData.tipo} onChange={handleChange} className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                  <option>Entrega</option>
                  <option>Retirada</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Prioridade</label>
                <select name="prioridade" value={formData.prioridade} onChange={handleChange} className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                  <option value="1">1 - Alta / Urgente</option>
                  <option value="2">2 - Média</option>
                  <option value="3">3 - Normal</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">E-mail do Responsável</label>
                <input type="email" name="email" value={formData.email} readOnly className="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none bg-gray-100 text-gray-500 cursor-not-allowed" />
              </div>
              <div className="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-100 mt-2">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Status do Lançamento</label>
                  <select 
                    name="status" 
                    value={formData.status} 
                    onChange={handleChange} 
                    disabled={!editingRecord}
                    className={`w-full rounded-lg px-4 py-2 outline-none ${!editingRecord ? 'border border-gray-200 bg-gray-50 text-gray-500 cursor-not-allowed appearance-none' : 'border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-blue-50/50'}`}
                  >
                    <option value="A definir">A definir</option>
                    <option value="Aguardar confirmação">Aguardar confirmação</option>
                    <option value="Aguardar rota">Aguardar rota</option>
                    <option value="Em rota">Em rota</option>
                    <option value="Concluído">Concluído</option>
                    <option value="Cancelado">Cancelado</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Motorista</label>
                  <select 
                    name="motorista" 
                    value={formData.motorista} 
                    onChange={handleChange} 
                    disabled={!editingRecord}
                    className={`w-full rounded-lg px-4 py-2 outline-none ${!editingRecord ? 'border border-gray-200 bg-gray-50 text-gray-500 cursor-not-allowed appearance-none' : 'border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-blue-50/50'}`}
                  >
                    <option value="A definir">A definir</option>
                    {motoristas.map(m => (
                      <option key={m.nome} value={m.nome}>{m.nome}</option>
                    ))}
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div>
            <h3 className="text-sm font-semibold text-gray-800 uppercase tracking-wider mb-4 border-b pb-2">2. Cliente e Localização</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="md:col-span-2">
                <label className="block text-sm font-medium text-gray-700 mb-1">Cliente / Fornecedor</label>
                <div className="relative">
                  <input 
                    required
