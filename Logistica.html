  // 5. CADASTRO DE CLIENTES
  const ClientesTab = ({ clientes, userName }) => {
    const [formData, setFormData] = useState({ id: null, cliente: '', cnpj: '', cep: '', cidade: '', endereco: '', numero: '' });
    
    // --- ESTADOS PARA OS CAMPOS DE BUSCA ---
    const [searchNome, setSearchNome] = useState('');
    const [searchCnpj, setSearchCnpj] = useState('');
    const [deletePrompt, setDeletePrompt] = useState(null);
    const [deleteKey, setDeleteKey] = useState('');
    const [duplicatePrompt, setDuplicatePrompt] = useState(null);
    const [logModalData, setLogModalData] = useState(null);

    const handleChange = (e) => {
      const { name, value } = e.target;
      let formattedValue = value;
      if (name === 'cnpj') {
        formattedValue = formattedValue.replace(/\D/g, "");
        if (formattedValue.length > 14) formattedValue = formattedValue.slice(0, 14);
        formattedValue = formattedValue.replace(/^(\d{2})(\d)/, "$1.$2");
        formattedValue = formattedValue.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
        formattedValue = formattedValue.replace(/\.(\d{3})(\d)/, ".$1/$2");
        formattedValue = formattedValue.replace(/(\d{4})(\d)/, "$1-$2");
      } else if (name === 'cep') {
        formattedValue = formattedValue.replace(/\D/g, "");
        if (formattedValue.length > 8) formattedValue = formattedValue.slice(0, 8);
        formattedValue = formattedValue.replace(/^(\d{5})(\d)/, "$1-$2");
      }
      setFormData(prev => ({ ...prev, [name]: formattedValue }));
    };

    const searchCep = async () => {
      const cleanCep = formData.cep ? formData.cep.replace(/\D/g, "") : "";
      if (cleanCep.length === 8) {
        try {
          const response = await fetch(`https://viacep.com.br/ws/${cleanCep}/json/`);
          const data = await response.json();
          if (!data.erro) {
            setFormData(prev => ({
              ...prev,
              cidade: data.localidade || prev.cidade,
              endereco: `${data.logradouro || ''}${data.logradouro && data.bairro ? ', ' : ''}${data.bairro || ''}`
            }));
          } else {
            alert('CEP não encontrado.');
          }
        } catch (error) {
          alert('Erro ao buscar o CEP.');
        }
      }
    };

    const searchAddress = async () => {
      if (!formData.endereco) return;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(formData.endereco + ', Brasil')}`);
        const data = await res.json();
        if (data && data.length > 0) {
          const addr = data[0].address;
          const displayParts = [];
          if (addr.road) displayParts.push(addr.road);
          if (addr.suburb || addr.neighbourhood) displayParts.push(addr.suburb || addr.neighbourhood);
          
          setFormData(prev => ({
            ...prev,
            cep: addr.postcode ? addr.postcode.replace(/^(\d{5})(\d)/, "$1-$2") : prev.cep,
            cidade: addr.city || addr.town || addr.municipality || addr.village || prev.cidade,
            endereco: displayParts.length > 0 ? displayParts.join(', ') : data[0].display_name.split(',').slice(0,2).join(',')
          }));
        } else {
          alert('Endereço não encontrado.');
        }
      } catch (err) {
        alert('Erro ao buscar a localização pelo endereço.');
      }
    };

    const handleSearchCnpjChange = (e) => {
      let val = e.target.value.replace(/\D/g, "");
      if (val.length > 14) val = val.slice(0, 14);
      val = val.replace(/^(\d{2})(\d)/, "$1.$2");
      val = val.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
      val = val.replace(/\.(\d{3})(\d)/, ".$1/$2");
      val = val.replace(/(\d{4})(\d)/, "$1-$2");
      setSearchCnpj(val);
    };

    const clearSearch = () => {
      setSearchNome('');
      setSearchCnpj('');
    };

    const performSave = async (isOverwrite = false, existingId = null) => {
      const payload = {
        cliente: formData.cliente,
        cnpj: formData.cnpj,
        cep: formData.cep || '',
        cidade: formData.cidade,
        endereco: formData.endereco,
        numero: formData.numero || '',
        timestamp: Date.now()
      };

      let targetId = formData.id || existingId;

      if (targetId) {
        const original = clientes.find(c => c.id === targetId);
        const currentLogs = original?.logs || [];
        const fieldsToTrack = { cliente: 'Nome', cnpj: 'CNPJ', cep: 'CEP', cidade: 'Cidade', endereco: 'Endereço', numero: 'Número' };
        let mudancas = [];
        for (let key in fieldsToTrack) {
            if (String(original[key] || '') !== String(payload[key] || '')) {
                mudancas.push(`${fieldsToTrack[key]}: ${original[key] || '-'} ➔ ${payload[key] || '-'}`);
            }
        }

        if (isOverwrite) {
            payload.logs = [...currentLogs, {
                dataHora: new Date().toLocaleString('pt-PT').replace(',', ''),
                usuario: userName,
                acao: 'Substituição (Duplicado)',
                detalhes: `Dados substituídos ao tentar cadastrar CNPJ já existente. Mudanças: ${mudancas.join(' | ')}`
            }];
        } else if (mudancas.length > 0) {
            payload.logs = [...currentLogs, {
                dataHora: new Date().toLocaleString('pt-PT').replace(',', ''),
                usuario: userName,
                acao: 'Edição',
                detalhes: mudancas.join(' | ')
            }];
        } else {
            payload.logs = currentLogs;
        }

        try {
          await db.collection('clientes').doc(targetId).update(payload);
        } catch (error) {
          alert('Erro ao atualizar: ' + error.message);
          return;
        }
      } else {
        payload.logs = [{
            dataHora: new Date().toLocaleString('pt-PT').replace(',', ''),
            usuario: userName,
            acao: 'Criação',
            detalhes: 'Cliente cadastrado'
        }];
        try {
          await db.collection('clientes').add(payload);
        } catch (error) {
          alert('Erro ao adicionar cliente: ' + error.message);
          return;
        }
      }
      
      setFormData({ id: null, cliente: '', cnpj: '', cep: '', cidade: '', endereco: '', numero: '' });
      setDuplicatePrompt(null);
    };

    const handleSubmit = async (e) => {
      e.preventDefault();
      
      if (!formData.cnpj || formData.cnpj.length !== 18) {
        alert('É obrigatório preencher todos os 14 dígitos do CNPJ para cadastrar o cliente.');
        return;
      }

      if (!formData.id) {
        const existing = clientes.find(c => c.cnpj === formData.cnpj);
        if (existing) {
          setDuplicatePrompt(existing);
          return;
        }
      }

      await performSave();
    };

    const handleEdit = (cliente) => {
      setFormData({
        id: cliente.id,
        cliente: cliente.cliente || '',
        cnpj: cliente.cnpj || '',
        cep: cliente.cep || '',
        cidade: cliente.cidade || '',
        endereco: cliente.endereco || '',
        numero: cliente.numero || ''
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const filteredClientes = clientes.filter(c => {
      const matchNome = c.cliente.toLowerCase().includes(searchNome.toLowerCase());
      const matchCnpj = (c.cnpj || '').includes(searchCnpj);
      return matchNome && matchCnpj;
    });

    return (
      <div className="space-y-6 max-w-5xl mx-auto animate-in fade-in duration-300">
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
            <h2 className="text-lg font-bold text-gray-800">{formData.id ? 'Editar Cliente' : 'Novo Cliente'}</h2>
          </div>
          <form onSubmit={handleSubmit} className="p-6 space-y-4">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
              <div className="md:col-span-2">
                <label className="block text-sm font-medium text-gray-700 mb-1">Cliente / Fornecedor</label>
                <input required type="text" name="cliente" value={formData.cliente} onChange={handleChange} placeholder="Razão Social" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div className="md:col-span-2">
                <label className="block text-sm font-medium text-gray-700 mb-1">CNPJ</label>
                <input required type="text" name="cnpj" value={formData.cnpj} onChange={handleChange} placeholder="00.000.000/0000-00" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              
              <div className="md:col-span-1">
                <label className="block text-sm font-medium text-gray-700 mb-1">CEP</label>
                <div className="relative">
                  <input type="text" name="cep" value={formData.cep || ''} onChange={handleChange} onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); searchCep(); } }} placeholder="00000-000" className="w-full border border-gray-300 rounded-lg pl-4 pr-10 py-2 focus:ring-2 focus:ring-blue-500 outline-none" />
                  <button type="button" onClick={searchCep} className="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-blue-600 transition-colors" title="Buscar por CEP">
                    <IconSearch className="w-5 h-5" />
                  </button>
                </div>
              </div>
              <div className="md:col-span-1">
                <label className="block text-sm font-medium text-gray-700 mb-1">Cidade</label>
                <input required type="text" name="cidade" value={formData.cidade} onChange={handleChange} placeholder="Ex: Jundiaí" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div className="md:col-span-2 grid grid-cols-4 gap-4">
                <div className="col-span-3">
                  <label className="block text-sm font-medium text-gray-700 mb-1">Endereço</label>
                  <div className="relative">
                    <input required type="text" name="endereco" value={formData.endereco} onChange={handleChange} onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); searchAddress(); } }} placeholder="Rua, Bairro" className="w-full border border-gray-300 rounded-lg pl-4 pr-10 py-2 focus:ring-2 focus:ring-blue-500 outline-none" />
                    <button type="button" onClick={searchAddress} className="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-blue-600 transition-colors" title="Buscar CEP/Cidade pelo Endereço digitado">
                      <IconSearch className="w-5 h-5" />
                    </button>
                  </div>
                </div>
                <div className="col-span-1">
                  <label className="block text-sm font-medium text-gray-700 mb-1">Número</label>
                  <input required type="text" name="numero" value={formData.numero || ''} onChange={handleChange} placeholder="Nº" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
              </div>
            </div>
            
            <div className="flex flex-col md:flex-row justify-between items-center pt-4 border-t border-gray-100 mt-4 gap-4">
              <div className="flex items-center space-x-3 w-full flex-1">
                <div className="relative w-full flex-[2]">
                  <IconSearch className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                  <input 
                    type="text" 
                    placeholder="Buscar Cliente..." 
                    value={searchNome}
                    onChange={(e) => setSearchNome(e.target.value)}
                    className="pl-9 pr-3 py-2 border border-gray-300 rounded-lg w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                  />
                </div>
                <div className="relative w-full flex-[1] min-w-[140px]">
                  <IconSearch className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                  <input 
                    type="text" 
                    placeholder="Buscar CNPJ..." 
                    value={searchCnpj}
                    onChange={handleSearchCnpjChange}
                    className="pl-9 pr-3 py-2 border border-gray-300 rounded-lg w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                  />
                </div>
                <button 
                  type="button"
                  onClick={clearSearch}
                  title="Limpar Busca"
                  className="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors flex-shrink-0"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
              </div>

              <div className="flex items-center space-x-3 w-full md:w-auto justify-end flex-shrink-0">
                {formData.id && (
                  <button type="button" onClick={() => setFormData({ id: null, cliente: '', cnpj: '', cep: '', cidade: '', endereco: '', numero: '' })} className="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">
                    Cancelar
                  </button>
                )}
                <button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium shadow-sm whitespace-nowrap">
                  {formData.id ? 'Salvar Alterações' : 'Adicionar Cliente'}
                </button>
              </div>
            </div>
          </form>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
           <div className="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
              <h3 className="font-bold text-gray-800">Clientes Cadastrados ({filteredClientes.length})</h3>
           </div>
           <div className="overflow-x-auto">
             <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                    <th className="px-6 py-4 font-medium">Cliente / Fornecedor</th>
                    <th className="px-6 py-4 font-medium">CNPJ</th>
                    <th className="px-6 py-4 font-medium">Cidade</th>
                    <th className="px-6 py-4 font-medium">Endereço</th>
                    <th className="px-6 py-4 font-medium text-center">Ações</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100 text-sm">
                  {filteredClientes.map(c => (
                    <tr key={c.id} className="hover:bg-gray-50 transition-colors">
                      <td className="px-6 py-4 font-medium text-gray-800">{c.cliente}</td>
                      <td className="px-6 py-4 text-gray-600 whitespace-nowrap">{c.cnpj || '-'}</td>
                      <td className="px-6 py-4 text-gray-600">{c.cidade}</td>
                      <td className="px-6 py-4 text-gray-600">{c.endereco}{c.numero ? `, ${c.numero}` : ''}</td>
                      <td className="px-6 py-4 text-center">
                        <div className="flex items-center justify-center space-x-2">
                          <button onClick={() => handleEdit(c)} className="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded transition-colors" title="Editar"><IconEdit className="w-4 h-4" /></button>
                          <button onClick={() => { setDeletePrompt(c); setDeleteKey(''); }} className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors" title="Excluir"><IconTrash className="w-4 h-4" /></button>
                          <button onClick={() => setLogModalData(c)} className="p-1.5 text-gray-400 hover:text-purple-600 hover:bg-purple-50 rounded transition-colors" title="Histórico de Alterações"><IconClipboardList className="w-4 h-4" /></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {filteredClientes.length === 0 && (
                    <tr><td colSpan="5" className="px-6 py-8 text-center text-gray-500">Nenhum cliente encontrado.</td></tr>
                  )}
                </tbody>
             </table>
           </div>
        </div>

        {/* MODAL DE EXCLUSÃO (CLIENTES) */}
        {deletePrompt && (
          <div className="fixed inset-0 bg-gray-900/60 flex items-center justify-center z-[80] p-4">
            <div className="bg-white rounded-xl shadow-lg w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200">
              <div className="px-6 py-4 border-b border-gray-100 bg-red-50/50 flex items-center justify-between">
                <div className="flex items-center">
                  <IconTrash className="w-5 h-5 text-red-500 mr-2" />
                  <h3 className="font-bold text-gray-800">Confirmar Exclusão</h3>
                </div>
                <button onClick={() => setDeletePrompt(null)} className="text-gray-400 hover:text-gray-600 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
              </div>
              <div className="p-6 space-y-4">
                <p className="text-sm text-gray-600 text-center">Para excluir este cliente, insira a <b>Chave de Acesso</b> do sistema.</p>
                <input 
                  type="password" 
                  placeholder="Chave de Acesso" 
                  value={deleteKey} 
                  onChange={(e) => setDeleteKey(e.target.value)} 
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none text-center tracking-widest" 
                  autoFocus
                />
                <div className="pt-2 flex justify-end space-x-3">
                  <button onClick={() => setDeletePrompt(null)} className="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">Cancelar</button>
                  <button onClick={async () => {
                    if (deleteKey !== 'Revi') { alert('Chave de Acesso incorreta!'); return; }
                    try {
                      await db.collection('clientes').doc(deletePrompt.id).delete();
                      setDeletePrompt(null);
                    } catch (error) { alert('Erro ao excluir cliente: ' + error.message); }
                  }} className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm font-medium shadow-sm flex items-center">
                    Excluir
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* MODAL CNPJ DUPLICADO */}
        {duplicatePrompt && (
          <div className="fixed inset-0 bg-gray-900/60 flex items-center justify-center z-[80] p-4">
            <div className="bg-white rounded-xl shadow-lg w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
              <div className="px-6 py-4 border-b border-gray-100 bg-orange-50/50 flex items-center justify-between">
                <div className="flex items-center">
                  <IconAlertCircle className="w-5 h-5 text-orange-500 mr-2" />
                  <h3 className="font-bold text-gray-800">Cliente Já Cadastrado</h3>
                </div>
                <button onClick={() => setDuplicatePrompt(null)} className="text-gray-400 hover:text-gray-600 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
              </div>
              <div className="p-6 space-y-4 text-center">
                <p className="text-sm text-gray-600">
                  O CNPJ <b>{formData.cnpj}</b> já está registrado no sistema para o cliente:<br/>
                  <span className="text-blue-700 font-bold block mt-2 text-base">{duplicatePrompt.cliente}</span>
                </p>
                <p className="text-sm text-gray-500">Deseja substituir os dados existentes pelos dados que acabou de preencher?</p>
                <div className="pt-4 flex justify-center space-x-3">
                  <button onClick={() => setDuplicatePrompt(null)} className="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">Cancelar</button>
                  <button onClick={() => performSave(true, duplicatePrompt.id)} className="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition-colors text-sm font-medium shadow-sm">
                    Substituir Dados
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* MODAL DE HISTÓRICO DE ALTERAÇÕES */}
        {logModalData && (
          <div className="fixed inset-0 bg-gray-900/50 flex items-center justify-center z-[70] p-4">
            <div className="bg-white rounded-xl shadow-lg w-full max-w-2xl max-h-[80vh] flex flex-col animate-in fade-in zoom-in duration-200">
              <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 className="font-bold text-gray-800 flex items-center">
                  <IconClipboardList className="w-5 h-5 text-blue-600 mr-2" />
                  Histórico de Alterações - Cliente
                </h3>
                <button onClick={() => setLogModalData(null)} className="text-gray-400 hover:text-gray-600 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
              </div>
              <div className="p-6 overflow-y-auto flex-1">
                <div className="mb-4">
                  <p className="text-sm text-gray-500"><strong>Cliente:</strong> {logModalData.cliente}</p>
                  <p className="text-sm text-gray-500"><strong>CNPJ:</strong> {logModalData.cnpj || '-'}</p>
                </div>
                
                {(!logModalData.logs || logModalData.logs.length === 0) ? (
                  <div className="text-center py-8 text-gray-500 bg-gray-50 rounded-lg border border-gray-100">
                    Nenhum histórico registrado para este cliente.
                  </div>
                ) : (
                  <div className="space-y-4">
                    {logModalData.logs.map((log, index) => (
                      <div key={index} className="flex gap-4 p-4 rounded-lg border border-gray-100 bg-gray-50/30">
                        <div className="flex flex-col items-center">
                          <div className="w-2 h-2 rounded-full bg-blue-500 mt-1.5"></div>
                          {index !== logModalData.logs.length - 1 && <div className="w-px h-full bg-blue-200 my-1"></div>}
                        </div>
                        <div className="flex-1">
                          <div className="flex justify-between items-start mb-1">
                            <span className="font-semibold text-gray-800 text-sm">{log.acao}</span>
                            <span className="text-xs text-gray-400 font-medium">{log.dataHora}</span>
                          </div>
                          <p className="text-xs text-gray-500 font-medium mb-1">Por: {log.usuario}</p>
                          <p className="text-sm text-gray-700">{log.detalhes}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  function App() {
    const [session, setSession] = useState(null);
    const [activeTab, setActiveTab] = useState('lista');
    const [registros, setRegistros] = useState([]);
    const [editingRecord, setEditingRecord] = useState(null);
    const [motoristas, setMotoristas] = useState([]);
    const [clientes, setClientes] = useState([]);
    const [isLoading, setIsLoading] = useState(true);
    const [logoUrl, setLogoUrl] = useState(null);

    // Gestão da Autenticação
    useEffect(() => {
      const unsubscribe = auth.onAuthStateChanged((user) => {
        if (user) {
          setSession({ user });
        } else {
          setSession(null);
          setIsLoading(false);
        }
      });
      return () => unsubscribe();
    }, []);

    // Leituras em Tempo Real (.onSnapshot)
    useEffect(() => {
      if (!session) return;
      
      setIsLoading(true);

      // Escutar Logo
      const unsubConfig = db.collection('appSettings').doc('config').onSnapshot(doc => {
        if (doc.exists && doc.data().logoUrl) setLogoUrl(doc.data().logoUrl);
      });

      // Escutar Motoristas
      const unsubMot = db.collection('motoristas').onSnapshot(snap => {
        const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        list.sort((a, b) => {
          if (a.nome.toLowerCase() === 'a definir') return -1;
          if (b.nome.toLowerCase() === 'a definir') return 1;
          return a.nome.localeCompare(b.nome);
        });
        setMotoristas(list);
      });

      // Escutar Clientes
      const unsubCli = db.collection('clientes').onSnapshot(snap => {
        const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        setClientes(list);
      });

      // Escutar Registos de Logística
      const unsubReg = db.collection('registros').onSnapshot(snap => {
        const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        setRegistros(list);
        setIsLoading(false); // Só esconde o ecrã de carregamento quando receber os registos
      }, (error) => {
        console.error("Erro ao ler os dados em tempo real:", error);
        setIsLoading(false);
      });

      // Limpar os listeners quando sair ou o componente desmontar
      return () => {
        unsubConfig();
        unsubMot();
        unsubCli();
        unsubReg();
      };
    }, [session]);

    const handleLogoUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onloadend = async () => {
        const base64String = reader.result;
        try {
          await db.collection('appSettings').doc('config').set({ logoUrl: base64String }, { merge: true });
        } catch (error) {
          console.error("Erro ao salvar logo:", error);
          alert("Erro ao salvar a logo na base de dados.");
        }
      };
      reader.readAsDataURL(file);
    };

    if (isLoading) {
      return (
        <div className="flex flex-col justify-center items-center h-screen text-gray-600 font-sans text-center p-5 bg-gray-50">
          <IconRefresh className="w-10 h-10 mb-4 animate-spin text-blue-600" />
          <h2 className="text-xl font-bold mb-2">A carregar o sistema...</h2>
          <p className="text-sm">Por favor, aguarde enquanto sincronizamos os dados.</p>
        </div>
      );
    }

    if (!session) {
      return <AuthScreen onAuthSuccess={(user) => setSession({ user })} />;
    }

    const userName = session.user.displayName || 'Utilizador';
    const userEmail = session.user.email;

    return (
      <div>
        <nav className="bg-blue-700 text-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-20">
                
                {/* LOGO E TÍTULO - Alinhados ao centro verticalmente */}
                <div className="flex items-center space-x-3 h-full">
                  <label className={`flex items-center justify-center cursor-pointer transition-colors ${logoUrl ? 'h-14 w-14 rounded-full overflow-hidden flex-shrink-0' : 'bg-white p-2 rounded-lg shadow-sm hover:bg-gray-100 flex-shrink-0'}`} title="Alterar Logo da Empresa">
                    {logoUrl ? (
                      <img src={logoUrl} alt="Logo Empresa" className="w-full h-full object-contain rounded-full" />
                    ) : (
                      <IconTruck className="w-6 h-6 text-blue-700" />
                    )}
                    <input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} />
                  </label>
                  <span className="font-bold text-2xl tracking-tight whitespace-nowrap">Logística</span>
                </div>
                
                {/* ABAS ESTILO FICHÁRIO PERFEITO - Alinhadas à base com ajuste vertical do texto */}
                <div className="hidden md:flex space-x-1 lg:space-x-2 flex-1 justify-center items-end h-full px-4">
                  <button 
                    onClick={() => setActiveTab('lista')} 
                    className={`h-[52px] px-4 lg:px-6 rounded-t-2xl text-sm transition-all whitespace-nowrap ${activeTab === 'lista' ? 'bg-gray-50 text-blue-800 font-bold' : 'text-blue-100 font-medium hover:bg-blue-600 hover:text-white'}`}
                  >
                    <div className="flex items-center justify-center h-full pb-3">
                      <IconListTodo className="w-4 h-4 mr-2 flex-shrink-0" /> Acompanhamentos
                    </div>
                  </button>
                  <button 
                    onClick={() => setActiveTab('mapa')} 
                    className={`h-[52px] px-4 lg:px-6 rounded-t-2xl text-sm transition-all whitespace-nowrap ${activeTab === 'mapa' ? 'bg-gray-50 text-blue-800 font-bold' : 'text-blue-100 font-medium hover:bg-blue-600 hover:text-white'}`}
                  >
                    <div className="flex items-center justify-center h-full pb-3">
                      <IconMap className="w-4 h-4 mr-2 flex-shrink-0" /> Mapa de Rotas
                    </div>
                  </button>
                  <button 
                    onClick={() => setActiveTab('motoristas')} 
                    className={`h-[52px] px-4 lg:px-6 rounded-t-2xl text-sm transition-all whitespace-nowrap ${activeTab === 'motoristas' ? 'bg-gray-50 text-blue-800 font-bold' : 'text-blue-100 font-medium hover:bg-blue-600 hover:text-white'}`}
                  >
                    <div className="flex items-center justify-center h-full pb-3">
                      <IconUsers className="w-4 h-4 mr-2 flex-shrink-0" /> Motoristas
                    </div>
                  </button>
                  <button 
                    onClick={() => setActiveTab('clientes')} 
                    className={`h-[52px] px-4 lg:px-6 rounded-t-2xl text-sm transition-all whitespace-nowrap ${activeTab === 'clientes' ? 'bg-gray-50 text-blue-800 font-bold' : 'text-blue-100 font-medium hover:bg-blue-600 hover:text-white'}`}
                  >
                    <div className="flex items-center justify-center h-full pb-3">
                      <IconBuilding className="w-4 h-4 mr-2 flex-shrink-0" /> Clientes
                    </div>
                  </button>
                  <button 
                    onClick={() => setActiveTab('dashboard')} 
                    className={`h-[52px] px-4 lg:px-6 rounded-t-2xl text-sm transition-all whitespace-nowrap ${activeTab === 'dashboard' ? 'bg-gray-50 text-blue-800 font-bold' : 'text-blue-100 font-medium hover:bg-blue-600 hover:text-white'}`}
                  >
                    <div className="flex items-center justify-center h-full pb-3">
                      <IconLayoutDashboard className="w-4 h-4 mr-2 flex-shrink-0" /> Dashboard
                    </div>
                  </button>
                </div>

                {/* USUÁRIO E SAIR - Alinhados ao centro verticalmente */}
                <div className="flex items-center space-x-4 h-full">
                  <span className="text-sm font-medium hidden xl:inline whitespace-nowrap">Bem-vindo - {userName}</span>
                  <button onClick={() => auth.signOut()} title="Sair" className="flex items-center justify-center w-8 h-8 bg-red-600 rounded-full border-2 border-white shadow-sm hover:bg-red-700 transition-colors flex-shrink-0">
                    <IconPower className="w-4 h-4 text-white" />
                  </button>
                </div>
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="flex md:hidden space-x-2 mb-6 overflow-x-auto pb-2">
              <button 
                onClick={() => setActiveTab('lista')} 
                className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium ${activeTab === 'lista' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}
              >
                Acompanhamentos
              </button>
              <button 
                onClick={() => setActiveTab('mapa')} 
                className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium ${activeTab === 'mapa' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}
              >
                Mapa de Rotas
              </button>
          <button 
            onClick={() => setActiveTab('motoristas')} 
            className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium ${activeTab === 'motoristas' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}
          >
            Motoristas
          </button>
          <button 
            onClick={() => setActiveTab('clientes')} 
            className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium ${activeTab === 'clientes' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}
          >
            Clientes
          </button>
          <button 
            onClick={() => setActiveTab('dashboard')} 
            className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}
          >
            Dashboard
          </button>
        </div>

        {activeTab === 'dashboard' && <DashboardTab registros={registros} motoristas={motoristas} />}
        {activeTab === 'mapa' && <MapTab registros={registros} motoristas={motoristas} clientes={clientes} />}
        {activeTab === 'lista' && <ListTab registros={registros} setEditingRecord={setEditingRecord} setActiveTab={setActiveTab} motoristas={motoristas} clientes={clientes} userEmail={userEmail} userName={userName} />}
        {activeTab === 'form' && <FormTab registros={registros} editingRecord={editingRecord} setEditingRecord={setEditingRecord} setActiveTab={setActiveTab} motoristas={motoristas} clientes={clientes} userEmail={userEmail} userName={userName} />}
        {activeTab === 'motoristas' && <MotoristasTab motoristas={motoristas} />}
        {activeTab === 'clientes' && <ClientesTab clientes={clientes} userName={userName} />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
